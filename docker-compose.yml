version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: sagar_db
      POSTGRES_USER: sagar_user
      POSTGRES_PASSWORD: sagar_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sagar-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sagar-network

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: sagar_minio
      MINIO_ROOT_PASSWORD: sagar_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - sagar-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://sagar_user:sagar_password@postgres:5432/sagar_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: sagar_minio
      MINIO_SECRET_KEY: sagar_minio_password
      JWT_SECRET: your-super-secret-jwt-key
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - sagar-network

  nlp-service:
    build:
      context: ./apps/nlp-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:3001
    depends_on:
      - redis
      - backend
    networks:
      - sagar-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_NLP_URL: http://localhost:8000
      NEXT_PUBLIC_MAPBOX_TOKEN: your-mapbox-token
    depends_on:
      - backend
      - nlp-service
    networks:
      - sagar-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sagar-network:
    driver: bridge
